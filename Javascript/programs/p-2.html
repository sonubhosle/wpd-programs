<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Container */
        .calculator-wrapper {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        /* Title */
        .calculator-title {
            margin-bottom: 10px;
        }

        .calculator-subtitle {
            font-size: 12px;
            color: gray;
            margin-bottom: 20px;
        }

        /* Inputs */
        .input-group {
            margin-bottom: 20px;
        }

        input[type="number"] {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        /* Buttons */
        .btn-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            padding: 10px;
            border: none;
            background-color: #4CAF50;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        /* Result */
        .result-box {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #fafafa;
        }

        #result {
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="calculator-wrapper">
        <h1 class="calculator-title">🧮 Calculator</h1>
        <p class="calculator-subtitle">Simple &amp; Elegant</p>

        <div class="input-group">
            <div>
                <div class="input-label">First Number</div>
                <div class="input-field-wrapper">
                    <span class="icon">①</span>
                    <input type="number" id="num1" placeholder="e.g. 42">
                </div>
            </div>
            <div>
                <div class="input-label">Second Number</div>
                <div class="input-field-wrapper">
                    <span class="icon">②</span>
                    <input type="number" id="num2" placeholder="e.g. 8">
                </div>
            </div>
        </div>

        <div class="buttons-label">Choose Operation</div>
        <div class="btn-grid">
            <button id="btn-add" onclick="calculate('+')">➕ Add</button>
            <button id="btn-sub" onclick="calculate('-')">➖ Subtract</button>
            <button id="btn-mul" onclick="calculate('*')">✖️ Multiply</button>
            <button id="btn-div" onclick="calculate('/')">➗ Divide</button>
        </div>

        <div class="result-box" id="result-box">
            <span id="result"><span class="result-placeholder">Result will appear here…</span></span>
        </div>
    </div>

    <script>
        function calculate(operator) {
            let num1 = parseFloat(document.getElementById("num1").value);
            let num2 = parseFloat(document.getElementById("num2").value);
            let result;
            const resultEl = document.getElementById("result");
            const resultBox = document.getElementById("result-box");

            resultBox.classList.remove("has-result", "has-error");

            if (isNaN(num1) || isNaN(num2)) {
                resultEl.innerText = "⚠️ Please enter valid numbers";
                resultBox.classList.add("has-error");
                return;
            }

            switch (operator) {
                case '+': result = num1 + num2; break;
                case '-': result = num1 - num2; break;
                case '*': result = num1 * num2; break;
                case '/':
                    if (num2 === 0) {
                        resultEl.innerText = "⚠️ Cannot divide by zero";
                        resultBox.classList.add("has-error");
                        return;
                    }
                    result = num1 / num2;
                    break;
            }

            const opSymbols = { '+': '+', '-': '−', '*': '×', '/': '÷' };
            resultEl.innerText = `${num1} ${opSymbols[operator]} ${num2} = ${result}`;
            resultBox.classList.add("has-result");

            // re-trigger animation
            resultEl.classList.remove("result-animate");
            void resultEl.offsetWidth;
            resultEl.classList.add("result-animate");
        }
    </script>

</body>

</html>

<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f0f0f0;
        }

        .box {
            width: 300px;
            margin: 100px auto;
            padding: 20px;
            background: white;
            text-align: center;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 10px 0;
        }

        button {
            padding: 10px;
            width: 100%;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: darkgreen;
        }

        #error {
            color: red;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Login</h2>

    <form onsubmit="return validate()">
        <input type="text" id="email" placeholder="Enter Email"><br>
        <input type="password" id="password" placeholder="Enter Password"><br>

        <button type="submit">Login</button>
    </form>

    <p id="error"></p>
</div>

<script>
function validate() {
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;
    let error = document.getElementById("error");

    error.innerHTML = "";

    if (email == "" || password == "") {
        error.innerHTML = "All fields are required";
        return false;
    }

    if (!email.includes("@")) {
        error.innerHTML = "Enter valid email";
        return false;
    }

    if (password.length < 4) {
        error.innerHTML = "Password must be at least 4 characters";
        return false;
    }

    alert("Login successful!");
    return true;
}
</script>

</body>
</html>

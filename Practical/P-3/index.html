<!DOCTYPE html>
<html>

<head>
    <title>Frame Layout Example</title>
</head>

<frameset rows="20%,70%,10%">

    <!-- Header Frame -->
    <frame src="header.html" name="headerFrame">

        <!-- Middle Section (Left + Right) -->
        <frameset cols="30%,70%">
            <frame src="left.html" name="leftFrame">
                <frame src="right.html" name="rightFrame">
        </frameset>

        <!-- Status/Footer Frame -->
        <frame src="status.html" name="statusFrame">

</frameset>

</html>
